# Pixel AI — Google Cloud Run Deployment
# Build:  gcloud builds submit --config=cloudbuild.yaml

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/pixel:latest"
      - "-t"
      - "gcr.io/$PROJECT_ID/pixel:$BUILD_ID"
      - "-f"
      - "Dockerfile.cloudrun"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/pixel:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "pixel"
      - "--image=gcr.io/$PROJECT_ID/pixel:latest"
      - "--platform=managed"
      - "--region=us-central1"
      - "--memory=4Gi"
      - "--cpu=2"
      - "--timeout=300"
      - "--concurrency=80"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=LOG_LEVEL=INFO"
      - "--set-secrets=SECRETS_TOML=secrets-toml:latest"
      - "--set-secrets=PIXEL_JWT_SECRET=pixel-jwt-secret:latest"
      - "--set-secrets=PIXEL_ISSUE_SECRET=pixel-issue-secret:latest"
      - "--set-secrets=RESEND_API_KEY=resend-api-key:latest"
      - "--set-secrets=PAYMENT_WALLET=pixel-payment-wallet:latest"
      - "--vpc-connector=projects/$PROJECT_ID/locations/us-central1/connectors/pixel-vpc"
      - "--egress=all-traffic"
      - "--no-allow-unauthenticated"
      - "--service-account=pixel-sa@$PROJECT_ID.iam.gserviceaccount.com"

timeout: "1800s"
images:
  - "gcr.io/$PROJECT_ID/pixel:latest"
  - "gcr.io/$PROJECT_ID/pixel:$BUILD_ID"
